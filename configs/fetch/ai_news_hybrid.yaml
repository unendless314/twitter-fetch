# 主題識別碼（用於檔名、資料夾名）
id: "ai_news_hybrid"

# 搜尋策略：以自然語言描述為框架，融入 Keywords 檢索語法
search:
  tool: "hybrid"           # 混合模式：自然語言目標描述 + Keywords 檢索策略
  mode: "Latest"          # Top (熱門) 或 Latest (最新時間排序)
  limit: 10               # 預期返回推文數量
  lookback_days: 5        # 時間範圍：搜尋最近幾天（由 fetch.py 動態注入 since: 日期）

  # 自然語言目標描述 + Keywords 檢索策略的融合
  query: |
    目標：
    尋找 AI 與機器學習領域的重大突破、令人驚喜的新模型發布、範式轉移、
    基準測試結果，或正在興起的研究趨勢——包括那些可能還沒有廣為人知名稱的新事物。
    聚焦於技術社群真正感到興奮且正在熱烈討論的內容。

    推薦檢索策略：
    - 核心技術/架構：(LLM OR VLM OR "foundation model" OR RAG OR "fine-tuning" OR agentic OR "open weights")
    - 研發與開源術語：(arXiv OR paper OR SOTA OR "state of the art" OR repo OR github OR benchmark)
    - 排除條件：-crypto -blockchain -token -coin -nft -web3

    若上述 keywords 未找到合適結果，可依據「目標描述」擴大或調整搜尋方向，但務必嚴格遵守排除條件。

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 100
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # 可選：追蹤特定帳號的發文（留空或移除此欄位則不限定來源）
    # from_accounts:
    #   - OpenAI
    #   - AnthropicAI
    #   - GoogleDeepMind

# 內容篩選說明
filter:
  include: |
    官方公告（OpenAI、Anthropic、Google DeepMind 等）、
    技術論文發布（arXiv、Hugging Face）、
    有數據或截圖佐證的消息、
    知名研究者或工程師分享、
    社群熱烈討論的新技術、
    令人意外的研究結果、
    尚無定論但引發廣泛關注的新發展
  exclude: |
    價格炒作、加密貨幣相關、無根據謠言、純粹的產品廣告

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句）
