# 主題識別碼（用於檔名、資料夾名）
id: "macro_finance_semantic"

# 搜尋策略
search:
  tool: "semantic"      # keyword (精準關鍵字) 或 semantic (語意描述)
  mode: "Latest"        # Top (熱門) 或 Latest (最新時間排序）
  limit: 10             # 預期返回推文數量
  lookback_days: 3      # 語意搜尋建議縮短時間範圍，避免雜訊過多

  # Semantic 模式：自然語言描述你想找什麼（不需要提前知道關鍵字）
  query: |
    Global macroeconomic developments, central bank policy shifts, interest rate
    decisions, inflation trends, bond market movements, currency fluctuations,
    and their impacts on financial markets. Focus on institutional investors,
    economists, and financial analysts discussing macro themes rather than
    individual stock picks.

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 80
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # from_accounts:
    #  - FederalReserve
    #  - ECB
    #  - IMFNews
    #  - economics
    #  - birdyword

# 內容篩選說明
filter:
  include: "全球總體經濟趨勢、央行政策轉向信號、利率決策影響分析、通膨與就業數據解讀、機構投資者宏觀觀點、跨資產類別的連動分析"
  exclude: "加密貨幣價格預測、個股或個別公司分析、純技術指標討論、投資組合廣告、未經證實的市場傳言"

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與宏觀金融的關聯性）
