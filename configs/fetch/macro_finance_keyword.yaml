# 主題識別碼（用於檔名、資料夾名）
id: "macro_finance_keyword"

# 搜尋策略
search:
  tool: "keyword"       # keyword (精準關鍵字) 或 semantic (語意描述)
  mode: "Latest"        # Top (熱門) 或 Latest (最新時間排序)
  limit: 10             # 預期返回推文數量
  lookback_days: 5      # 時間範圍：搜尋最近幾天（由 fetch.py 動態注入 since: 日期）

  # Keyword 模式：X 進階搜尋語法
  # 組合策略：(總體經濟關鍵字) + (金融市場關鍵字) - (排除雜訊)
  query: |
    (macro OR "monetary policy" OR "interest rate" OR Fed OR ECB OR "central bank")
    ("bond yield" OR "yield curve" OR inflation OR recession OR "GDP growth" OR FX OR forex OR commodity)
    -crypto -bitcoin -ethereum -nft -defi -airdrop

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 50
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # 可選：追蹤特定帳號的發文（留空或移除此欄位則不限定來源）
    # from_accounts:
    #   - FederalReserve
    #   - ECB
    #   - IMFNews
    #   - economics

# 內容篩選說明
filter:
  include: "央行政策聲明、總體經濟數據發布、利率決策分析、債券市場動態、匯率與大宗商品走勢、知名經濟學家觀點"
  exclude: "加密貨幣價格預測、個股推薦、純技術分析、無根據的市場謠言、投資廣告"

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與宏觀金融的關聯性）
