# 主題識別碼（用於檔名、資料夾名）
id: "crypto_institutional_hybrid"

# 搜尋策略：以自然語言描述為框架，融入 Keywords 檢索語法
search:
  tool: "hybrid"           # 混合模式：自然語言目標描述 + Keywords 檢索策略
  mode: "Latest"           # Top (熱門) 或 Latest (最新時間排序)
  limit: 10                # 預期返回推文數量
  lookback_days: 5         # Crypto 節奏快，縮短時間範圍

  # 自然語言目標描述 + Keywords 檢索策略的融合
  query: |
    目標：
    尋找比特幣和以太坊的機構級發展，包括 ETF 資金流向、監管政策進展、
    協議升級（如質押和 Layer 2 擴展）、企業財庫採用案例，
    以及加密資產作為資產類別的宏觀分析。
    聚焦於已建立聲譽的加密機構研究、監管文件和基本面鏈上指標。

    推薦檢索策略：
    - 傳統金融與合規：(TradFi OR custody OR SEC OR "regulatory framework" OR compliance OR MiCA OR "structured products" OR RWA)
    - 機構動態與宏觀：("asset management" OR BlackRock OR Fidelity OR "balance sheet" OR "treasury" OR "capital allocation")
    - 排除條件：-airdrop -gem -"100x" -scam -memecoin -shitcoin -giveaway

    若上述 keywords 未找到合適結果，可依據「目標描述」擴大或調整搜尋方向，但務必嚴格遵守排除條件。

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 80           # Crypto 門檻提高，過濾機器人噪音
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # 可選：追蹤特定帳號的發文（留空或移除此欄位則不限定來源）
    # from_accounts:
    #   - Coinbase
    #   - a16z
    #   - MessariCrypto
    #   - VitalikButerin
    #   - grayscale

# 內容篩選說明
filter:
  include: |
    機構資金流向、ETF 申購贖回數據、監管政策進展、協議技術升級、
    大型企業採用案例、鏈上基本面分析、機構研究報告、
    監管政策解讀、ETF 資金流向分析、協議基本面數據、
    企業採用案例、宏觀資產配置觀點
  exclude: |
    散戶喊盤、垃圾幣推廣、詐騙項目、
    散戶投機討論、無根據傳言、詐騙項目推廣、
    過度簡化的投資建議

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與機構級加密資產的關聯性）
