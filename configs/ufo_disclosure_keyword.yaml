# 主題識別碼（用於檔名、資料夾名）
id: "ufo_disclosure_keyword"

# 搜尋策略
search:
  tool: "keyword"       # keyword (精準關鍵字) 或 semantic (語意描述)
  mode: "Latest"        # Top (熱門) 或 Latest (最新時間排序)
  limit: 10             # 預期返回推文數量
  lookback_days: 5      # 時間範圍：搜尋最近幾天

  # Keyword 模式：UFO/UAP 官方披露與相關討論
  query: |
    (UFO OR UAP OR "disclosure" OR "congressional hearing" OR "government report" OR "pentagon" OR "whistleblower")
    (alien OR "non-human" OR extraterrestrial OR "advanced technology" OR "gravitic propulsion" OR "reverse engineering")

  # 過濾條件參數
  conditions:
    min_faves: 50         # UFO 主題相對小眾，門檻降低
#      filter: "-replies"
    lang: "en OR lang:zh"
#    from_accounts:
#      - LueElizondo
#      - ChristopherKMellon
#      - CoulthartMJ
#      - RossCoulthart
#      - jeremycorbell

# 內容篩選說明
filter:
  include: "政府聽證會內容、官方報告發布、軍事人員證詞、解密文件、UAP 目擊事件調查、相關立法進展"
  exclude: "純娛樂內容、科幻小說討論、電影遊戲宣傳"

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與 UFO/Disclosure 主題的關聯性）
