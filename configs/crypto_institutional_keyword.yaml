# 主題識別碼（用於檔名、資料夾名）
id: "crypto_institutional_keyword"

# 搜尋策略
search:
  tool: "keyword"       # keyword (精準關鍵字) 或 semantic (語意描述)
  mode: "Latest"        # Top (熱門) 或 Latest (最新時間排序)
  limit: 10             # 預期返回推文數量
  lookback_days: 5      # 時間範圍：搜尋最近幾天（Crypto 節奏快，縮短時間）

  # Keyword 模式：機構級 Crypto 事件與基本面
  query: |
    (Bitcoin OR BTC OR Ethereum OR ETH OR "crypto ETF")
    (institutional OR ETF OR adoption OR regulation OR halving OR "layer 2" OR upgrade OR staking OR "spot ETF" OR inflow OR outflow OR "hash rate")
    -airdrop -gem -"100x" -scam -memecoin -shitcoin

  # 過濾條件參數
  conditions:
    min_faves: 80        # Crypto 門檻提高，過濾機器人噪音
#      filter: "-replies"
    lang: "en OR lang:zh"
#    from_accounts:
#      - Coinbase
#      - a16z
#      - MessariCrypto
#      - VitalikButerin
#      - grayscale

# 內容篩選說明
filter:
  include: "機構資金流向、ETF 申購贖回數據、監管政策進展、協議技術升級、大型企業採用案例、鏈上基本面分析"
  exclude: "散戶喊盤、垃圾幣推廣、詐騙項目"

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與機構級加密資產的關聯性）
