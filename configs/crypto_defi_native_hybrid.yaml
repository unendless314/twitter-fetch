# 主題識別碼（用於檔名、資料夾名）
id: "crypto_defi_native_hybrid"

# 搜尋策略：以自然語言描述為框架，融入 Keywords 檢索語法
search:
  tool: "hybrid"           # 混合模式：自然語言目標描述 + Keywords 檢索策略
  mode: "Latest"           # Top (熱門) 或 Latest (最新時間排序)
  limit: 10                # 預期返回推文數量
  lookback_days: 5         # DeFi 節奏極快，縮短時間範圍

  # 自然語言目標描述 + Keywords 檢索策略的融合
  query: |
    目標：
    尋找去中心化金融（DeFi）生態系統的最新發展，包括流動性挖礦策略、
    流動性池動態、資金費率套利、智能合約安全性、代幣經濟模型分析、協議治理更新，
    以及 TVL、FDV 等鏈上指標變化。
    聚焦於專業 DeFi 社群討論，而非純粹的投機交易。

    推薦檢索策略：
    - 核心機制與敘事：(MEV OR "prediction market" OR restaking OR AVS OR LRT OR "blockchain" OR "zero knowledge" OR ZKP)
    - 深度技術與數據：(exploit OR audit OR "flash loan" OR "liquidity" OR "smart contract" OR "on-chain data")
    - 排除條件：-scam -rug -gem -"100x" -shitcoin -"guaranteed" -giveaway

    若上述 keywords 未找到合適結果，可依據「目標描述」擴大或調整搜尋方向，但務必嚴格遵守排除條件。

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 80           # DeFi 原生內容門檻適中，因為較小眾但專業
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # 可選：追蹤特定帳號的發文（留空或移除此欄位則不限定來源）
    # from_accounts:
    #   - a16z
    #   - MessariCrypto
    #   - Uniswap
    #   - AaveAave
    #   - CurveFinance
    #   - LidoFinance
    #   - tokenterminal

# 內容篩選說明
filter:
  include: |
    DeFi 協議更新、流動性挖礦策略、資金費率分析、鏈上數據洞察、
    智能合約審計結果、代幣經濟模型討論、套利機會分析、巨鯨動向追蹤、
    協議經濟模型分析、流動性策略優化、風險調整後收益討論、
    治理提案評估、智能合約安全、鏈上數據深度洞察、機構級 DeFi 採用案例
  exclude: |
    未經審計的新項目推廣、過度承諾收益、無根據的暴富策略、
    Rug Pull 預警以外的恐慌散布、純粹的代幣銷售廣告、
    無風險提示的投資建議、純粹的代幣促銷、缺乏數據支撐的觀點

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與 DeFi 原生策略或協議的關聯性）
