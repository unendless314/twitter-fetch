# 主題識別碼（用於檔名、資料夾名）
id: "crypto_defi_native_semantic"

# 搜尋策略
search:
  tool: "semantic"      # keyword (精準關鍵字) 或 semantic (語意描述)
  mode: "Latest"        # Top (熱門) 或 Latest (最新時間排序）
  limit: 10             # 預期返回推文數量
  lookback_days: 5      # DeFi 節奏極快，縮短時間範圍

  # Semantic 模式：DeFi 專業生態與策略
  query: |
    Decentralized finance (DeFi) ecosystem developments, including yield farming
    strategies, liquidity pool dynamics, funding rate arbitrage, tokenomics analysis,
    protocol governance updates, and on-chain metrics like TVL and FDV.
    Focus on sophisticated DeFi participants discussing risk-adjusted strategies,
    smart contract security, and sustainable token models rather than speculative trading.

  # 過濾條件參數
  conditions:
    min_faves: 80        # 語意搜尋門檻較高，確保品質
#      filter: "-replies"
    lang: "en OR lang:zh"
  #  from_accounts:
  #    - a16z
  #    - MessariCrypto
  #    - Uniswap
  #    - AaveAave
  #    - CurveFinance
  #    - LidoFinance
  #    - tokenterminal

# 內容篩選說明
filter:
  include: "協議經濟模型分析、流動性策略優化、風險調整後收益討論、治理提案評估、智能合約安全、鏈上數據深度洞察、機構級 DeFi 採用案例"
  exclude: "無風險提示的投資建議、純粹的代幣促銷、缺乏數據支撐的觀點"

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與 DeFi 原生策略或協議的關聯性）
