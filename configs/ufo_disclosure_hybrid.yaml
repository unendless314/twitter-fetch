# 主題識別碼（用於檔名、資料夾名）
id: "ufo_disclosure_hybrid"

# 搜尋策略：以自然語言描述為框架，融入 Keywords 檢索語法
search:
  tool: "hybrid"           # 混合模式：自然語言目標描述 + Keywords 檢索策略
  mode: "Latest"           # Top (熱門) 或 Latest (最新時間排序)
  limit: 10                # 預期返回推文數量
  lookback_days: 7         # 時間範圍：搜尋最近幾天（由 run.py 動態注入 since: 日期）

  # 自然語言目標描述 + Keywords 檢索策略的融合
  query: |
    目標：
    尋找政府 UFO/UAP 披露進展，包括國會聽證會、五角大廈報告、軍事人員證詞、
    解密文件以及對不明空中現象的官方調查。
    聚焦於可信來源，如政府官員、軍事人員、調查記者和學術研究人員，
    討論披露工作進展及 UAP 相關證據。

    推薦檢索策略：
    - 核心關鍵字：(UFO OR UAP OR "disclosure" OR "congressional hearing" OR "government report" OR "pentagon" OR "whistleblower")
    - 技術/實體描述：(alien OR "non-human" OR extraterrestrial OR "advanced technology" OR "gravitic propulsion" OR "reverse engineering")

    若上述 keywords 未找到合適結果，可依據「目標描述」擴大或調整搜尋方向。

  # 過濾條件參數（獨立於查詢邏輯之外）
  conditions:
    min_faves: 50           # UFO 主題相對小眾，門檻適中
#      filter: "-replies"    # 排除類型（加 -）：-replies | -images | -videos
                           # 只限類型（不加 -）：images | videos | news | links
    lang: "en OR lang:zh" # 語言：en | zh | ja | ko（多語言用 OR 連接）
    # 可選：追蹤特定帳號的發文（留空或移除此欄位則不限定來源）
    # from_accounts:
    #   - LueElizondo
    #   - ChristopherKMellon
    #   - CoulthartMJ
    #   - RossCoulthart
    #   - jeremycorbell

# 內容篩選說明
filter:
  include: |
    政府聽證會內容、官方報告發布、軍事人員證詞、解密文件、
    UAP 目擊事件調查、相關立法進展、官方披露進展、
    政府調查報告、解密文件分析、學術研究、主流媒體深度報導
  exclude: |
    純娛樂內容、科幻小說討論、電影遊戲宣傳、
    無根據猜測、科幻創作

# 輸出格式要求
output:
  format: |
    請以結構化 JSON 格式返回，每條推文包含以下欄位：
    - author: 作者顯示名稱
    - username: @用戶名（不含@）
    - time: 發布時間（ISO 8601 格式，含時區，例如 2026-02-23T14:30:00Z）
    - content: 推文完整內容（保留原始文字，包含連結）
    - url: 推文永久連結（格式：https://x.com/username/status/post_id）
    - engagement: {likes: 數量, retweets: 數量, replies: 數量}
    - media_urls: 推文中的圖片或影片連結陣列（無媒體則為空陣列 []）
    - relevance_note: 簡短說明為何符合此主題（1-2句，請說明與 UFO/Disclosure 主題的關聯性）
